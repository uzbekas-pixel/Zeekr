<style>#car-cursor{position:fixed;pointer-events:none;z-index:99999;left:0;top:0;font-size:28px;transform:translate(-50%,-50%);filter:drop-shadow(0 0 8px rgba(255,200,0,0.8));}*{cursor:none !important;}</style><style>#progress-bar{position:fixed;top:0;left:0;height:3px;width:0%;background:linear-gradient(90deg,#1a1a1a,#555);z-index:99999;transition:width 0.1s;}</style><style>#loader{position:fixed;inset:0;background:#fff;z-index:999999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity 0.5s,visibility 0.5s;}#loader.hide{opacity:0;visibility:hidden;}#loader-logo{font-size:32px;font-weight:700;letter-spacing:4px;color:#111;}#loader-bar{width:200px;height:2px;background:#eee;border-radius:2px;overflow:hidden;}#loader-fill{height:100%;width:0%;background:#111;animation:load 1.2s ease forwards;}@keyframes load{to{width:100%;}}</style><style>html{scroll-behavior:smooth;}</style><style>#back-top{position:fixed;bottom:32px;right:32px;width:44px;height:44px;background:#111;color:#fff;border:none;border-radius:50%;font-size:20px;cursor:pointer;z-index:9999;opacity:0;visibility:hidden;transition:opacity 0.3s,visibility 0.3s,transform 0.3s;display:flex;align-items:center;justify-content:center;}#back-top.show{opacity:1;visibility:visible;}#back-top:hover{transform:translateY(-4px);background:#333;}</style><style>#cookie-banner{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:16px 28px;border-radius:12px;display:flex;align-items:center;gap:16px;z-index:99999;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,0.3);transition:opacity 0.4s,transform 0.4s;}#cookie-banner.hide{opacity:0;transform:translateX(-50%) translateY(20px);pointer-events:none;}#cookie-btn{background:#fff;color:#111;border:none;padding:8px 18px;border-radius:8px;font-weight:600;cursor:pointer;white-space:nowrap;}#cookie-btn:hover{background:#ddd;}</style><style>#theme-btn{position:fixed;top:16px;right:16px;z-index:99999;width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}#theme-btn:hover{transform:scale(1.1);}body.light-mode{filter:invert(1) hue-rotate(180deg);}body.light-mode img,body.light-mode video{filter:invert(1) hue-rotate(180deg);}</style><style>#page-transition{position:fixed;inset:0;background:#111;z-index:999998;pointer-events:none;opacity:0;transition:opacity 0.4s ease;}#page-transition.fade-in{opacity:1;}#page-transition.fade-out{opacity:0;}body{animation:pageIn 0.4s ease;}@keyframes pageIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}</style></head>

    <script>
        let width = 0;
let interval = setInterval(() => {
    if (width >= 100) {
        clearInterval(interval);
        document.getElementById("percent").textContent = "✅ Tayyor!";
        
        setTimeout(() => {
            window.location.href = "zeekr.html";

<div id="car-cursor">&#x1F697;</div><script>const car=document.getElementById("car-cursor");let px=0;document.addEventListener("mousemove",e=>{car.style.left=e.clientX+"px";car.style.top=e.clientY+"px";if(e.clientX-px<-2)car.style.transform="translate(-50%,-50%) scaleX(-1)";else if(e.clientX-px>2)car.style.transform="translate(-50%,-50%) scaleX(1)";px=e.clientX;});</script><div id="progress-bar"></div><script>window.addEventListener("scroll",()=>{const s=document.documentElement;const p=(s.scrollTop/(s.scrollHeight-s.clientHeight))*100;document.getElementById("progress-bar").style.width=p+"%";});</script><button id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#8679;</button><script>window.addEventListener("scroll",()=>{const btn=document.getElementById("back-top");if(window.scrollY>300)btn.classList.add("show");else btn.classList.remove("show");});</script><div id="cookie-banner"><span>?? Saytimiz cookie fayllaridan foydalanadi.</span><button id="cookie-btn" onclick="document.getElementById('cookie-banner').classList.add('hide');localStorage.setItem('cookie','1')">Qabul qilish</button></div><script>if(localStorage.getItem('cookie'))document.getElementById('cookie-banner').classList.add('hide');</script><button id="theme-btn">??</button><script>const tb=document.getElementById("theme-btn");if(localStorage.getItem("theme")==="light"){document.body.classList.add("light-mode");tb.textContent="??";}tb.addEventListener("click",()=>{document.body.classList.toggle("light-mode");const isLight=document.body.classList.contains("light-mode");tb.textContent=isLight?"??":"??";localStorage.setItem("theme",isLight?"light":"dark");});</script><div id="page-transition"></div><script>document.querySelectorAll("a[onclick]").forEach(a=>{a.addEventListener("click",function(e){const fn=this.getAttribute("onclick");if(fn&&fn.includes("location.href")){e.preventDefault();const match=fn.match(/location\.href=.([^.']+\.html)/);if(match){const overlay=document.getElementById("page-transition");overlay.classList.add("fade-in");setTimeout(()=>{eval(fn);},400);}}});});</script></body>
