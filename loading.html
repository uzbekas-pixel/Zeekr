<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="idea.css">
<style>#car-cursor{position:fixed;pointer-events:none;z-index:99999;left:0;top:0;font-size:28px;transform:translate(-50%,-50%);filter:drop-shadow(0 0 8px rgba(255,200,0,0.8));}*{cursor:none !important;}</style><style>#progress-bar{position:fixed;top:0;left:0;height:3px;width:0%;background:linear-gradient(90deg,#1a1a1a,#555);z-index:99999;transition:width 0.1s;}</style><style>#loader{position:fixed;inset:0;background:#fff;z-index:999999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity 0.5s,visibility 0.5s;}#loader.hide{opacity:0;visibility:hidden;}#loader-logo{font-size:32px;font-weight:700;letter-spacing:4px;color:#111;}#loader-bar{width:200px;height:2px;background:#eee;border-radius:2px;overflow:hidden;}#loader-fill{height:100%;width:0%;background:#111;animation:load 1.2s ease forwards;}@keyframes load{to{width:100%;}}</style><style>html{scroll-behavior:smooth;}</style><style>#back-top{position:fixed;bottom:32px;right:32px;width:44px;height:44px;background:#111;color:#fff;border:none;border-radius:50%;font-size:20px;cursor:pointer;z-index:9999;opacity:0;visibility:hidden;transition:opacity 0.3s,visibility 0.3s,transform 0.3s;display:flex;align-items:center;justify-content:center;}#back-top.show{opacity:1;visibility:visible;}#back-top:hover{transform:translateY(-4px);background:#333;}</style><style>#page-transition{position:fixed;inset:0;background:#111;z-index:999998;pointer-events:none;opacity:0;transition:opacity 0.4s ease;}#page-transition.fade-in{opacity:1;}#page-transition.fade-out{opacity:0;}body{animation:pageIn 0.4s ease;}@keyframes pageIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}</style><style>#cookie-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999997;backdrop-filter:blur(4px);transition:opacity 0.4s;}#cookie-overlay.hide{opacity:0;pointer-events:none;}#cookie-box{position:fixed;bottom:0;left:0;right:0;background:#fff;z-index:999998;padding:32px 48px;display:flex;align-items:center;justify-content:space-between;gap:24px;box-shadow:0 -8px 40px rgba(0,0,0,0.15);transition:transform 0.4s;}#cookie-box.hide{transform:translateY(100%);}#cookie-box h3{font-size:18px;font-weight:700;margin-bottom:6px;color:#111;}#cookie-box p{font-size:14px;color:#555;max-width:600px;line-height:1.5;}#cookie-box .cookie-btns{display:flex;gap:12px;flex-shrink:0;}#cookie-accept{background:#111;color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s;}#cookie-accept:hover{background:#333;}#cookie-decline{background:transparent;color:#111;border:2px solid #ddd;padding:12px 28px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;}#cookie-decline:hover{border-color:#999;}</style></head>
<body><div id="loader"><div id="loader-logo">ZEEKR</div><div id="loader-bar"><div id="loader-fill"></div></div></div><script>window.addEventListener("load",()=>{setTimeout(()=>{document.getElementById("loader").classList.add("hide");},1300);});</script>
    <style>
        body {
    background-color: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
}

.progress-container {
    width: 400px;
    height: 30px;
    background-color: #333;
  
    overflow: hidden;
}

.progress-bar {
    width: 0%;
    height: 100%;
    
    background: green;
    transition: width 0.05s linear;
}

.percent {
    color: white;
    font-size: 32px;
    font-family: Arial;
    margin-top: 15px;
    font-weight: bold;
}
img{
    width: 60%;
    height: 40%;
    top: 0;
    display: flex;
    justify-content: center;
   margin: 40px auto;
    position: absolute;
}
    </style>
    <img src="https://asiamotors.bh/wp-content/uploads/2021/12/Logo-White-Zeekr.png" >
    <br><br><br><br>
    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>
    <div class="percent" id="percent">0%</div>

    <script>
        let width = 0;
let interval = setInterval(() => {
    if (width >= 100) {
        clearInterval(interval);
        document.getElementById("percent").textContent = "✅ Tayyor!";
        
        setTimeout(() => {
            window.location.href = "zeekr.html";
        }, 500);
        
    } else {
        width++;
        document.getElementById("bar").style.width = width + "%";
        document.getElementById("percent").textContent = width + "%";
    }
}, 25);
    </script>
<div id="car-cursor">&#x1F697;</div><script>const car=document.getElementById("car-cursor");let px=0;document.addEventListener("mousemove",e=>{car.style.left=e.clientX+"px";car.style.top=e.clientY+"px";if(e.clientX-px<-2)car.style.transform="translate(-50%,-50%) scaleX(-1)";else if(e.clientX-px>2)car.style.transform="translate(-50%,-50%) scaleX(1)";px=e.clientX;});</script><div id="progress-bar"></div><script>window.addEventListener("scroll",()=>{const s=document.documentElement;const p=(s.scrollTop/(s.scrollHeight-s.clientHeight))*100;document.getElementById("progress-bar").style.width=p+"%";});</script><button id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#8679;</button><script>window.addEventListener("scroll",()=>{const btn=document.getElementById("back-top");if(window.scrollY>300)btn.classList.add("show");else btn.classList.remove("show");});</script><div id="page-transition"></div><script>document.querySelectorAll("a[onclick]").forEach(a=>{a.addEventListener("click",function(e){const fn=this.getAttribute("onclick");if(fn&&fn.includes("location.href")){e.preventDefault();const match=fn.match(/location\.href=.([^.']+\.html)/);if(match){const overlay=document.getElementById("page-transition");overlay.classList.add("fade-in");setTimeout(()=>{eval(fn);},400);}}});});</script><div id="cookie-overlay"></div><div id="cookie-box"><div><h3>?? Cookie sozlamalari</h3><p>Saytimiz tajribangizni yaxshilash uchun cookie fayllaridan foydalanadi. Davom etish orqali siz cookie siyosatimizga rozilik bildirasiz.</p></div><div class="cookie-btns"><button id="cookie-decline" onclick="hideCookie()">Rad etish</button><button id="cookie-accept" onclick="hideCookie()">Qabul qilish</button></div></div><script>function hideCookie(){document.getElementById('cookie-box').classList.add('hide');document.getElementById('cookie-overlay').classList.add('hide');localStorage.setItem('cookie','1');}if(localStorage.getItem('cookie'))hideCookie();</script></body>
</html>
